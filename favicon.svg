<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    ENOS Limited favicon — gear + E mark
    Matches the uploaded logo: white gear on navy, bold E in circular hub.

    WEBFLOW: Upload the PNG version of this file via:
    Site Settings > Favicon > Upload image
    (Webflow accepts PNG up to 100×100px for favicons.)
  -->

  <!-- Navy background with slight rounding -->
  <rect width="100" height="100" rx="8" fill="#050a30"/>

  <!--
    12-tooth gear polygon.
    Each tooth spans ±5° at outer radius (44), shoulders at ±10°
    connected to inner radius (36). Valleys at r=36 between teeth.
    Points computed for CX=50, CY=50, r_outer=44, r_inner=36,
    teeth centred at 0°, 30°, 60° … 330°.
  -->
  <polygon
    fill="white"
    points="
      85.5,43.7  93.8,46.2  93.8,53.8  85.5,56.3
      83.8,62.3  89.9,68.6  86.0,75.3  77.6,73.2
      73.2,77.6  75.3,86.0  68.6,89.9  62.3,83.8
      56.3,85.5  53.8,93.8  46.2,93.8  43.7,85.5
      37.7,83.8  31.4,89.9  24.7,86.0  26.9,77.6
      22.4,73.2  14.0,75.3  10.1,68.6  16.2,62.3
      14.5,56.3   6.2,53.8   6.2,46.2  14.5,43.7
      16.2,37.7  10.1,31.4  14.0,24.7  22.4,26.9
      26.9,22.4  24.7,14.0  31.4,10.1  37.7,16.2
      43.7,14.5  46.2,6.2   53.8,6.2   56.3,14.5
      62.3,16.2  68.6,10.1  75.3,14.0  73.2,22.4
      77.6,26.9  86.0,24.7  89.9,31.4  83.8,37.7
    "
  />

  <!-- Navy disc — cuts out gear centre, leaving the white ring -->
  <circle cx="50" cy="50" r="28" fill="#050a30"/>

  <!-- White hub ring (border around E) -->
  <circle cx="50" cy="50" r="22" fill="white"/>

  <!-- Navy fill behind E -->
  <circle cx="50" cy="50" r="17" fill="#050a30"/>

  <!--
    Bold "E" — uses Georgia (matches the Playfair Display weight visually
    at small favicon sizes; external web fonts don't load in SVG favicons).
    Positioned with dominant-baseline to stay vertically centred.
  -->
  <text
    x="50" y="51"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="bold"
    fill="white"
  >E</text>
</svg>
