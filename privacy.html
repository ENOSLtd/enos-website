  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:       #050a30;
      --navy-mid:   #080e40;
      --navy-light: #0d1555;
      --blue:       #274690;
      --blue-mid:   #3254a8;
      --blue-light: #4a6fc0;
      --white:      #ffffff;
      --w70:  rgba(255,255,255,0.70);
      --w40:  rgba(255,255,255,0.40);
      --w15:  rgba(255,255,255,0.15);
      --w08:  rgba(255,255,255,0.08);
      --w04:  rgba(255,255,255,0.04);
      --nav-bg: rgba(5,10,48,0.88);
    }
    html[data-theme="light"] {
      --navy:       #f8f9fb;
      --navy-mid:   #f0f2f7;
      --navy-light: #e8ecf5;
      --white:      #050a30;
      --w70:  rgba(5,10,48,0.72);
      --w40:  rgba(5,10,48,0.45);
      --w15:  rgba(5,10,48,0.12);
      --w08:  rgba(5,10,48,0.06);
      --w04:  rgba(5,10,48,0.03);
      --nav-bg: rgba(248,249,251,0.95);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Outfit', sans-serif; background: var(--navy); color: var(--white); line-height: 1.6; overflow-x: hidden; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; line-height: 1.12; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 64px;
      background: var(--nav-bg); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--w15); transition: padding 0.3s;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo svg { width: 38px; height: 38px; }
    .nav-logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--white); letter-spacing: 0.04em; }
    .nav-logo-text span { color: var(--blue-light); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: var(--w70); text-decoration: none; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-cta { background: var(--blue); color: #ffffff; padding: 10px 22px; border-radius: 2px; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; border: 1px solid var(--blue-mid); transition: background 0.2s, transform 0.2s; }
    .nav-cta:hover { background: var(--blue-mid); transform: translateY(-1px); }
    .nav-hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 40px; height: 40px; background: transparent; border: 1px solid var(--w15); border-radius: 2px; padding: 8px 7px; cursor: pointer; flex-shrink: 0; }
    .nav-hamburger span { display: block; height: 1.5px; background: var(--white); border-radius: 1px; transition: transform 0.3s, opacity 0.3s; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-nav { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 99; background: var(--navy); padding: 100px 32px 40px; flex-direction: column; gap: 0; }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { color: var(--w70); text-decoration: none; font-size: 1.1rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 18px 0; border-bottom: 1px solid var(--w08); transition: color 0.2s; }
    .mobile-nav a:hover { color: var(--white); }
    .mobile-nav .mobile-cta { margin-top: 32px; background: var(--blue); color: #ffffff; padding: 16px 24px; border-radius: 2px; text-align: center; border: none; }
    @media(max-width:900px) {
      nav { padding: 16px 24px; }
      .nav-links, .nav-cta { display: none; }
      .nav-hamburger { display: flex; }
    }

    /* THEME TOGGLE */
    .nav-brand { display: flex; align-items: center; gap: 16px; }
    .theme-toggle {
      background: transparent; border: 1px solid var(--w15); border-radius: 2px;
      color: var(--w70); cursor: pointer; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0; transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { border-color: var(--white); color: var(--white); }
    .theme-toggle svg { width: 16px; height: 16px; }
    .icon-sun { display: none; }
    .icon-moon { display: block; }
    html[data-theme="light"] .icon-sun { display: block; }
    html[data-theme="light"] .icon-moon { display: none; }

    /* PAGE HEADER */
    .page-header {
      padding: 160px 64px 80px;
      background: linear-gradient(160deg, var(--navy-light) 0%, var(--navy) 60%);
      border-bottom: 1px solid var(--w08);
    }
    .page-header h1 { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 16px; }
    .page-header p { font-size: 1.05rem; color: var(--w70); max-width: 560px; }
    @media(max-width:900px) { .page-header { padding: 120px 24px 60px; } }

    /* PDF SECTION */
    .pdf-section {
      padding: 60px 64px 100px;
    }
    .pdf-wrapper {
      max-width: 900px;
      margin: 0 auto;
    }
    .pdf-actions {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .pdf-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue);
      color: #ffffff;
      padding: 10px 22px;
      border-radius: 2px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--blue-mid);
      transition: background 0.2s, transform 0.2s;
    }
    .pdf-download:hover { background: var(--blue-mid); transform: translateY(-1px); }
    .pdf-note { font-size: 0.8rem; color: var(--w40); font-family: 'JetBrains Mono', monospace; }
    .pdf-embed-container {
      width: 100%;
      height: 80vh;
      min-height: 600px;
      border: 1px solid var(--w15);
      border-radius: 2px;
      overflow: hidden;
      background: var(--w04);
    }
    .pdf-embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .pdf-fallback {
      display: none;
      padding: 60px 40px;
      text-align: center;
    }
    .pdf-fallback p { color: var(--w70); margin-bottom: 24px; }
    @media(max-width:900px) {
      .pdf-section { padding: 40px 24px 80px; }
      .pdf-embed-container { height: 60vh; min-height: 400px; }
    }

    /* FOOTER */
    footer {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 40px 64px;
      background: var(--navy-mid);
      border-top: 1px solid var(--w08);
      gap: 40px;
    }
    .footer-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
    .footer-sub { font-size: 0.85rem; color: var(--w70); margin-top: 3px; }
    .footer-nav { display: flex; gap: 28px; list-style: none; }
    .footer-nav a { color: var(--w70); text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
    .footer-nav a:hover { color: var(--white); }
    .footer-legal {
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
      color: var(--w40); letter-spacing: 0.05em;
      line-height: 1.8; text-align: right;
    }
    .footer-legal a { color: var(--w40); text-decoration: none; transition: color 0.2s; }
    .footer-legal a:hover { color: var(--white); }
    @media(max-width:900px) {
      footer { padding: 36px 20px; flex-direction: column; align-items: flex-start; gap: 20px; }
      .footer-legal { text-align: left; }
      .footer-nav { flex-wrap: wrap; gap: 16px; }
    }
  </style>
</head>
