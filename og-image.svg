<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="90%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#274690" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#050a30" stop-opacity="0"/>
    </radialGradient>
    <style>
      text { font-family: Georgia, 'Times New Roman', serif; }
      .mono { font-family: 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
